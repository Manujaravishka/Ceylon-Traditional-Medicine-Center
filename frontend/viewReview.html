<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reviews | Ceylon Traditional Medicine Center</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="assets/traditonal medical center.ico" type="image/x-icon">

    <!-- SweetAlert2 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --royal-green: #1b3d2f;
            --emerald: #2d6a4f;
            --gold: #d4af37;
            --soft-gold: #f4e4bc;
            --bg-cream: #f9f9f2;
            --white: #ffffff;
            --transition-smooth: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Outfit', sans-serif;
            color: var(--royal-green);
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        .navbar {
            padding: 1rem 8%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--soft-gold);
            z-index: 1000;
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            color: var(--royal-green);
            font-weight: 700;
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            align-items: center;
            margin: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--royal-green);
            margin-left: 25px;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: var(--transition-smooth);
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        /* --- Fixed Hero Section --- */
        .hero-section {
            position: relative;
            height: 500px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: var(--royal-green);
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(27, 61, 47, 0.8), rgba(27, 61, 47, 0.7)),
            url('https://images.unsplash.com/photo-1545205597-3d9d02c29597?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: var(--soft-gold);
            padding: 0 20px;
        }

        .hero-content h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 15px;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .hero-content p {
            font-size: 1.1rem;
            color: white;
            opacity: 0.9;
            max-width: 700px;
            margin: 0 auto;
        }

        /* --- Reviews Container --- */
        .reviews-container {
            background: var(--white);
            margin: -60px auto 100px;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--soft-gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            max-width: 1100px;
            position: relative;
            z-index: 10;
        }

        .table thead th {
            font-family: 'Cinzel', serif;
            color: var(--emerald);
            border-bottom: 2px solid var(--soft-gold);
            padding: 15px;
        }

        #reviewsTableBody tr {
            transition: var(--transition-smooth);
        }

        #reviewsTableBody tr:hover {
            background-color: #fbfbf6;
            transform: translateY(-3px);
        }

        .rating-badge {
            background: var(--royal-green);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
        }

        .delete-btn {
            background: transparent;
            border: 1.5px solid #ff4d4f;
            color: #ff4d4f;
            padding: 5px 12px;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #ff4d4f;
            color: white;
            transform: scale(1.05);
        }

        /* SweetAlert Custom Theme */
        .swal2-popup {
            font-family: 'Outfit', sans-serif;
            border-radius: 24px !important;
        }
        .swal2-title {
            font-family: 'Cinzel', serif !important;
            font-weight: 700 !important;
            color: var(--royal-green) !important;
        }
        .swal2-confirm {
            background: linear-gradient(135deg, var(--royal-green), var(--emerald)) !important;
            border-radius: 50px !important;
            font-weight: 600 !important;
            padding: 10px 28px !important;
        }
        .swal2-cancel {
            border-radius: 50px !important;
            border-color: var(--gold) !important;
            color: var(--gold) !important;
        }
        .swal2-icon.swal2-success {
            border-color: var(--emerald) !important;
        }
        .swal2-icon.swal2-warning {
            border-color: var(--gold) !important;
        }

        @media (max-width: 768px) {
            .hero-section { height: 350px; }
            .reviews-container { margin-top: -40px; padding: 20px; }
            .nav-links { display: none; }
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--royal-green);
            opacity: 0.7;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--gold);
        }
    </style>
</head>
<body>

<nav class="navbar d-flex justify-content-between">
    <a href="#" class="logo-text">
        <i id="main-icon" class="fas fa-spa me-2"></i>CEYLON TRADITIONAL MEDICINE CENTER
    </a>
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="review.html">Add Review</a></li>
        <li><a href="index.html" id="logoutBtn" style="color: #ff4d4f !important;">Logout</a></li>
    </ul>
</nav>

<div class="hero-section">
    <div class="hero-bg"></div>
    <div class="hero-content">
        <h1>Ceylon Traditional Healing</h1>
        <p>Your journey to wellness through ancient wisdom and modern care.</p>
    </div>
</div>

<div class="reviews-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 style="font-family: 'Cinzel', serif; color: var(--royal-green); margin: 0;">
            <i class="fas fa-star text-warning me-2"></i>My Reviews
        </h3>
        <a href="review.html" class="btn btn-dark" style="background: var(--royal-green); border-radius: 10px;">
            <i class="fas fa-plus me-2"></i>Write a Review
        </a>
    </div>

    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Ref ID</th>
                    <th>Rating</th>
                    <th>Comment</th>
                    <th>Date</th>
                    <th class="text-end">Action</th>
                </tr>
            </thead>
            <tbody id="reviewsTableBody">
                <tr>
                    <td colspan="5" class="text-center py-5 text-muted">
                        <i class="fas fa-spinner fa-pulse me-2"></i>Loading your sacred feedback...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // ========== BACKEND INTEGRATION with SweetAlert ==========
    const API_BASE = "http://localhost:8080/api/v1";

    function getFromLocalStorage(key) {
        const data = localStorage.getItem(key);
        if (!data) return null;
        try {
            const parsedData = JSON.parse(data);
            if (parsedData?.expiry !== undefined) {
                if (new Date().getTime() > parsedData.expiry) {
                    localStorage.removeItem(key);
                    return null;
                }
                return parsedData.value;
            }
            return data;
        } catch (e) { 
            return data; 
        }
    }

    function saveToLocalStorage(key, value, days = 7) {
        const expiryTime = new Date().getTime() + days * 24 * 60 * 60 * 1000;
        localStorage.setItem(key, JSON.stringify({ value, expiry: expiryTime }));
    }

    function removeFromLocalStorage(key) {
        localStorage.removeItem(key);
    }

    // SweetAlert helper functions
    function showSweetAlert(type, title, message, timer = null) {
        const config = {
            icon: type,
            title: title,
            text: message,
            confirmButtonText: type === 'success' ? 'Continue' : 'Okay',
            confirmButtonColor: '#1b3d2f',
            background: '#ffffff',
            backdrop: 'rgba(27, 61, 47, 0.4)',
            customClass: {
                popup: 'swal2-popup',
                title: 'swal2-title',
                confirmButton: 'swal2-confirm'
            }
        };
        
        if (type === 'success' && timer) {
            config.timer = timer;
            config.showConfirmButton = false;
        }
        
        Swal.fire(config);
    }

    function showConfirmDialog(title, message, confirmText = 'Yes, delete it', cancelText = 'Cancel') {
        return Swal.fire({
            title: title,
            text: message,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4f',
            cancelButtonColor: '#6c757d',
            confirmButtonText: confirmText,
            cancelButtonText: cancelText,
            background: '#ffffff',
            customClass: {
                popup: 'swal2-popup',
                confirmButton: 'swal2-confirm',
                cancelButton: 'swal2-cancel'
            }
        });
    }

    $(document).ready(function () {
        // Check authentication
        const token = getFromLocalStorage("token");
        const userEmail = getFromLocalStorage("email");
        
        if (!token || !userEmail) {
            showSweetAlert('warning', 'Authentication Required', 'Please log in to view your reviews.');
            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);
            return;
        }
        
        loadUserReviews();
        
        // Logout handler with beautiful confirmation
        $("#logoutBtn").on("click", function(e) {
            e.preventDefault();
            Swal.fire({
                title: '🌿 Begin Your Journey Out?',
                text: 'Are you sure you want to logout? Your healing path awaits your return.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#1b3d2f',
                cancelButtonColor: '#d4af37',
                confirmButtonText: 'Yes, Logout',
                cancelButtonText: 'Stay',
                background: '#f9f9f2',
                customClass: {
                    popup: 'swal2-popup',
                    confirmButton: 'swal2-confirm',
                    cancelButton: 'swal2-cancel'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    removeFromLocalStorage("token");
                    removeFromLocalStorage("email");
                    removeFromLocalStorage("role");
                    removeFromLocalStorage("name");
                    showSweetAlert('success', 'Farewell, Seeker', 'You have been logged out. May peace follow you.', 1500);
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1500);
                }
            });
        });
    });

    function loadUserReviews() {
        const userEmail = getFromLocalStorage("email");
        if (!userEmail) {
            $("#reviewsTableBody").html('<tr><td colspan="5" class="text-center"><div class="empty-state"><i class="fas fa-heart-broken"></i><p>Please log in to view your reviews.</p></div></td></tr>');
            return;
        }

        $.ajax({
            url: `${API_BASE}/review/all`,
            method: "GET",
            headers: {
                "Authorization": `Bearer ${getFromLocalStorage("token") || ""}`
            },
            success: function (response) {
                if (response.code === 200 || response.code === 201) {
                    const allReviews = response.data || [];
                    const userReviews = allReviews.filter(review => review.userEmail === userEmail);
                    if (userReviews.length > 0) {
                        renderReviews(userReviews);
                    } else {
                        $("#reviewsTableBody").html(`
                            <tr>
                                <td colspan="5" class="text-center">
                                    <div class="empty-state">
                                        <i class="fas fa-leaf"></i>
                                        <p>You haven't shared any healing experiences yet.</p>
                                        <a href="review.html" class="btn btn-sm" style="background: var(--royal-green); color: white; border-radius: 30px; margin-top: 10px;">
                                            <i class="fas fa-feather-alt"></i> Write Your First Review
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        `);
                    }
                } else {
                    $("#reviewsTableBody").html('<tr><td colspan="5" class="text-center text-muted">Unable to load reviews. Please try again later.</td></tr>');
                }
            },
            error: function(xhr) {
                console.error("Error loading reviews:", xhr);
                if (xhr.status === 401 || xhr.status === 403) {
                    showSweetAlert('error', 'Session Expired', 'Please log in again to continue your journey.');
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 2000);
                } else {
                    $("#reviewsTableBody").html('<tr><td colspan="5" class="text-center text-muted">Connection issue. Please refresh the page.</td></tr>');
                }
            }
        });
    }

    function formatDate(dateString) {
        if (!dateString) return 'N/A';
        try {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch {
            return dateString.substring(0, 10);
        }
    }

    function renderReviews(reviews) {
        const tbody = $("#reviewsTableBody");
        tbody.empty();
        reviews.forEach(review => {
            const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
            tbody.append(`
                <tr id="review-${review.id}" style="animation: fadeInUp 0.3s ease;">
                    <td><span class="badge" style="background: var(--soft-gold); color: var(--royal-green); padding: 6px 12px;">#${review.id}</span></td>
                    <td>
                        <span class="rating-badge" style="background: var(--royal-green); color: var(--gold);">
                            ${stars} ${review.rating}
                        </span>
                    </td>
                    <td class="text-muted" style="max-width: 300px;">
                        <i class="fas fa-quote-left me-1" style="color: var(--gold); font-size: 0.8rem;"></i>
                        "${escapeHtml(review.comment || 'No comment provided')}"
                    </td>
                    <td><i class="far fa-calendar-alt me-1" style="color: var(--gold);"></i> ${formatDate(review.createdAt)}</td>
                    <td class="text-end">
                        <button class="delete-btn" onclick="deleteReview(${review.id})" title="Delete this review">
                            <i class="fas fa-trash-alt"></i> Delete
                        </button>
                    </td>
                </tr>
            `);
        });
    }
    
    // Helper to escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Delete review with beautiful SweetAlert confirmation
    window.deleteReview = function(reviewId) {
        Swal.fire({
            title: 'Remove Your Healing Experience?',
            html: `<p style="font-size: 1rem;">This review will be permanently removed from your wellness journey.</p>
                   <p style="font-size: 0.85rem; color: #b48c48;">This action cannot be undone.</p>`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4f',
            cancelButtonColor: '#1b3d2f',
            confirmButtonText: '<i class="fas fa-trash me-2"></i>Yes, Delete',
            cancelButtonText: '<i class="fas fa-leaf me-2"></i>Keep It',
            background: '#ffffff',
            customClass: {
                popup: 'swal2-popup',
                confirmButton: 'swal2-confirm',
                cancelButton: 'swal2-cancel'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                // Show loading state
                Swal.fire({
                    title: 'Removing...',
                    text: 'Honoring your request to remove this review.',
                    icon: 'info',
                    showConfirmButton: false,
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });
                
                $.ajax({
                    url: `${API_BASE}/review/delete/${reviewId}`,
                    method: "DELETE",
                    headers: {
                        "Authorization": `Bearer ${getFromLocalStorage("token") || ""}`
                    },
                    success: function (response) {
                        if (response.code === 200 || response.code === 201 || response.code === 204) {
                            Swal.fire({
                                icon: 'success',
                                title: '✨ Review Removed ✨',
                                text: 'Your healing journey continues with gratitude.',
                                timer: 1800,
                                showConfirmButton: false,
                                background: '#ffffff'
                            });
                            $(`#review-${reviewId}`).fadeOut(300, function() {
                                $(this).remove();
                                // Check if table is empty after deletion
                                if ($("#reviewsTableBody tr").length === 0) {
                                    $("#reviewsTableBody").html(`
                                        <tr>
                                            <td colspan="5" class="text-center">
                                                <div class="empty-state">
                                                    <i class="fas fa-feather-alt"></i>
                                                    <p>Your sacred reviews list is now empty.</p>
                                                    <a href="review.html" class="btn btn-sm" style="background: var(--royal-green); color: white; border-radius: 30px; margin-top: 10px;">
                                                        <i class="fas fa-plus"></i> Share a New Experience
                                                    </a>
                                                </div>
                                            </td>
                                        </tr>
                                    `);
                                }
                            });
                        } else {
                            showSweetAlert('error', 'Unable to Delete', response.message || 'Please try again later.');
                        }
                    },
                    error: function(xhr) {
                        let errorMsg = "Could not delete the review. Please check your connection.";
                        if (xhr.status === 401) {
                            errorMsg = "Your session has expired. Please log in again.";
                            setTimeout(() => {
                                window.location.href = "index.html";
                            }, 2000);
                        } else if (xhr.responseJSON?.message) {
                            errorMsg = xhr.responseJSON.message;
                        }
                        showSweetAlert('error', 'Deletion Failed', errorMsg);
                    }
                });
            }
        });
    };
    
    // Add CSS animation
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .rating-badge {
            transition: var(--transition-smooth);
        }
        .rating-badge:hover {
            transform: scale(1.05);
        }
    `;
    document.head.appendChild(style);
    
    // Console welcome message
    console.log("%c🌿 Ceylon Traditional Medicine Center - Your Reviews 🌿", "color: #d4af37; font-size: 14px; font-weight: bold;");
</script>

</body>
</html>
