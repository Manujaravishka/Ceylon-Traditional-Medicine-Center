<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reviews | Ceylon Traditional Medicine Center</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --royal-green: #1b3d2f;
            --emerald: #2d6a4f;
            --gold: #d4af37;
            --soft-gold: #f4e4bc;
            --bg-cream: #f9f9f2;
            --white: #ffffff;
            --transition-smooth: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Outfit', sans-serif;
            color: var(--royal-green);
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        .navbar {
            padding: 1rem 8%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--soft-gold);
            z-index: 1000;
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            color: var(--royal-green);
            font-weight: 700;
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            align-items: center;
            margin: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--royal-green);
            margin-left: 25px;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* --- Fixed Hero Section --- */
        .hero-section {
            position: relative;
            height: 500px; /* පෙනෙන උස ස්ථාවර කළා */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: var(--royal-green); /* Backup color */
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(27, 61, 47, 0.8), rgba(27, 61, 47, 0.7)),
            url('https://images.unsplash.com/photo-1545205597-3d9d02c29597?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: var(--soft-gold);
            padding: 0 20px;
        }

        .hero-content h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 15px;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .hero-content p {
            font-size: 1.1rem;
            color: white;
            opacity: 0.9;
            max-width: 700px;
            margin: 0 auto;
        }

        /* --- Reviews Container --- */
        .reviews-container {
            background: var(--white);
            margin: -60px auto 100px;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--soft-gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            max-width: 1100px;
            position: relative;
            z-index: 10;
        }

        .table thead th {
            font-family: 'Cinzel', serif;
            color: var(--emerald);
            border-bottom: 2px solid var(--soft-gold);
            padding: 15px;
        }

        #reviewsTableBody tr {
            transition: var(--transition-smooth);
        }

        #reviewsTableBody tr:hover {
            background-color: #fbfbf6;
            transform: translateY(-3px);
        }

        .rating-badge {
            background: var(--royal-green);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 600;
        }

        .delete-btn {
            background: transparent;
            border: 1.5px solid #ff4d4f;
            color: #ff4d4f;
            padding: 5px 12px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #ff4d4f;
            color: white;
        }

        @media (max-width: 768px) {
            .hero-section { height: 350px; }
            .reviews-container { margin-top: -40px; padding: 20px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<nav class="navbar d-flex justify-content-between">
    <a href="#" class="logo-text">
        <i id="main-icon" class="fas fa-spa me-2"></i>HELA SUWAYA
    </a>
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="review.html">Add Review</a></li>
        <li><a href="index.html" style="color: #ff4d4f !important;">Logout</a></li>
    </ul>
</nav>

<div class="hero-section">
    <div class="hero-bg"></div>
    <div class="hero-content">
        <h1>Ceylon Traditional Healing</h1>
        <p>Your journey to wellness through ancient wisdom and modern care.</p>
    </div>
</div>

<div class="reviews-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 style="font-family: 'Cinzel', serif; color: var(--royal-green); margin: 0;">My Reviews</h3>
        <a href="review.html" class="btn btn-dark" style="background: var(--royal-green); border-radius: 10px;">
            <i class="fas fa-plus me-2"></i>Write a Review
        </a>
    </div>

    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
            <tr>
                <th>Ref ID</th>
                <th>Rating</th>
                <th>Comment</th>
                <th>Date</th>
                <th class="text-end">Action</th>
            </tr>
            </thead>
            <tbody id="reviewsTableBody">
            <tr><td colspan="5" class="text-center py-5 text-muted">Loading your feedback...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- Original JS Logic remains the same ---
    function getFromLocalStorage(key) {
        const data = localStorage.getItem(key);
        if (!data) return null;
        try {
            const parsedData = JSON.parse(data);
            if (new Date().getTime() > parsedData.expiry) {
                localStorage.removeItem(key);
                return null;
            }
            return parsedData.value;
        } catch (e) { return null; }
    }

    $(document).ready(function () {
        loadUserReviews();
    });

    function loadUserReviews() {
        const userEmail = getFromLocalStorage("email");
        if (!userEmail) {
            $("#reviewsTableBody").html('<tr><td colspan="5" class="text-center">Please log in.</td></tr>');
            return;
        }

        $.ajax({
            url: "http://localhost:8080/api/v1/review/all",
            method: "GET",
            success: function (response) {
                if (response.code === 200 || response.code === 201) {
                    const userReviews = response.data.filter(review => review.userEmail === userEmail);
                    if (userReviews.length > 0) {
                        renderReviews(userReviews);
                    } else {
                        $("#reviewsTableBody").html('<tr><td colspan="5" class="text-center py-5">No reviews found yet.</td></tr>');
                    }
                }
            }
        });
    }

    function renderReviews(reviews) {
        const tbody = $("#reviewsTableBody");
        tbody.empty();
        reviews.forEach(review => {
            tbody.append(`
                <tr id="review-${review.id}">
                    <td>#${review.id}</td>
                    <td><span class="rating-badge">${review.rating} ★</span></td>
                    <td class="text-muted italic">"${review.comment}"</td>
                    <td>${review.createdAt || 'N/A'}</td>
                    <td class="text-end">
                        <button class="delete-btn" onclick="deleteReview(${review.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `);
        });
    }

    function deleteReview(reviewId) {
        if (!confirm("Are you sure?")) return;
        $.ajax({
            url: `http://localhost:8080/api/v1/review/delete/${reviewId}`,
            method: "DELETE",
            success: function (response) {
                if (response.code === 200) {
                    $(`#review-${reviewId}`).fadeOut();
                }
            }
        });
    }
</script>

</body>
</html>
