<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="utf-8" />
    <title>Hela Suwaya | Sacred Sign In - Ayurveda Wellness Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />

    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="icon" href="assets/traditonal medical center.ico" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    

    <!-- SweetAlert2 CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --sacred-emerald: #1F4A3A;
            --sacred-emerald-light: #3A6B58;
            --sacred-gold: #D4AF7A;
            --sacred-gold-dark: #B48C48;
            --earth-cream: #FDF7F0;
            --charcoal-elegant: #2C3A33;
            --stone-mist: #6B5E4A;
            --white-pure: #FFFFFF;
            --error-red: #C97E5A;
            --success-green: #4A7C59;
            --shadow-elegant: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            --shadow-lux: 0 30px 50px -15px rgba(31, 74, 58, 0.2);
            --transition-silk: all 0.5s cubic-bezier(0.2, 0.95, 0.4, 1.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1F4A3A 0%, #0F2E24 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative Elements */
        body::before {
            content: "🌿";
            position: absolute;
            top: 5%;
            left: 3%;
            font-size: 8rem;
            opacity: 0.08;
            pointer-events: none;
        }

        body::after {
            content: "🪷";
            position: absolute;
            bottom: 5%;
            right: 3%;
            font-size: 8rem;
            opacity: 0.08;
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main Card */
        .auth-card {
            background: var(--white-pure);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: var(--shadow-lux);
            transition: var(--transition-silk);
        }

        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 60px -20px rgba(0, 0, 0, 0.3);
        }

        /* Header Section */
        .auth-header {
            background: linear-gradient(135deg, var(--sacred-emerald), var(--sacred-emerald-light));
            padding: 2rem 2rem 1.8rem;
            text-align: center;
            position: relative;
        }

        .auth-header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--sacred-gold);
            border-radius: 3px;
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--sacred-gold);
            margin-bottom: 0.8rem;
            display: inline-block;
            animation: gentleFloat 3s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .auth-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
        }

        .auth-subtitle {
            color: rgba(255, 248, 235, 0.85);
            font-size: 0.85rem;
            font-weight: 400;
        }

        /* Form Body */
        .auth-body {
            padding: 2rem 2rem 2rem;
        }

        /* Input Groups */
        .input-group-custom {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group-custom i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--sacred-gold);
            font-size: 1.1rem;
            z-index: 2;
            transition: var(--transition-silk);
        }

        .input-group-custom input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border: 1.5px solid #EADBCE;
            border-radius: 60px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            background: #FEFCF8;
            transition: var(--transition-silk);
            color: var(--charcoal-elegant);
        }

        .input-group-custom input:focus {
            outline: none;
            border-color: var(--sacred-gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 122, 0.15);
            background: var(--white-pure);
        }

        .input-group-custom input::placeholder {
            color: #C9BCA8;
            font-weight: 400;
        }

        /* Forgot Password */
        .forgot-link {
            text-align: right;
            margin-bottom: 1.5rem;
        }

        .forgot-link a {
            color: var(--stone-mist);
            font-size: 0.75rem;
            text-decoration: none;
            transition: var(--transition-silk);
            font-weight: 500;
        }

        .forgot-link a:hover {
            color: var(--sacred-gold);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--sacred-emerald), var(--sacred-emerald-light));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-silk);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(31, 74, 58, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Alert Messages - fallback for basic alerts (though we now use SweetAlert) */
        .alert-message {
            padding: 12px 18px;
            border-radius: 60px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1.5rem;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(74, 124, 89, 0.12);
            color: var(--success-green);
            border: 1px solid rgba(74, 124, 89, 0.3);
        }

        .alert-error {
            background: rgba(201, 126, 90, 0.12);
            color: var(--error-red);
            border: 1px solid rgba(201, 126, 90, 0.3);
        }

        /* Sign Up Link */
        .signup-section {
            text-align: center;
            padding-top: 0.5rem;
            border-top: 1px solid #EADBCE;
            margin-top: 0.5rem;
        }

        .signup-section p {
            color: var(--stone-mist);
            font-size: 0.85rem;
        }

        .signup-section a {
            color: var(--sacred-gold);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-silk);
        }

        .signup-section a:hover {
            color: var(--sacred-emerald);
            text-decoration: underline;
        }

        /* Loading State */
        .btn-submit.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-submit.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-body {
                padding: 1.5rem;
            }
            .auth-header {
                padding: 1.5rem;
            }
            .auth-header h1 {
                font-size: 1.8rem;
            }
            .logo-icon {
                font-size: 2.5rem;
            }
        }
        
        /* Custom SweetAlert Overrides for Ayurvedic Theme */
        .swal2-popup {
            font-family: 'Inter', sans-serif;
            border-radius: 28px !important;
            backdrop-filter: blur(2px);
        }
        .swal2-title {
            font-family: 'Cormorant Garamond', serif !important;
            font-weight: 700 !important;
            color: var(--sacred-emerald) !important;
        }
        .swal2-confirm {
            background: linear-gradient(135deg, var(--sacred-emerald), var(--sacred-emerald-light)) !important;
            border-radius: 60px !important;
            font-weight: 600 !important;
            padding: 12px 28px !important;
            box-shadow: 0 4px 12px rgba(31, 74, 58, 0.3) !important;
        }
        .swal2-cancel {
            border-radius: 60px !important;
            border-color: var(--sacred-gold) !important;
            color: var(--sacred-gold-dark) !important;
        }
        .swal2-icon.swal2-success {
            border-color: var(--success-green) !important;
        }
        .swal2-icon.swal2-success .swal2-success-ring {
            border-color: rgba(74, 124, 89, 0.3) !important;
        }
        .swal2-icon.swal2-error {
            border-color: var(--error-red) !important;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon">
                <i class="fas fa-feather-alt"></i>
            </div>
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Begin your sacred healing journey</p>
        </div>

        <div class="auth-body">
            <form id="loginForm" novalidate>
                <div class="input-group-custom">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email Address" required autocomplete="email">
                </div>

                <div class="input-group-custom">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
                </div>

                <div class="forgot-link">
                    <a href="#" id="forgotPasswordLink">Forgot your password?</a>
                </div>

                <button id="loginBtn" type="submit" class="btn-submit">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    Sign In
                </button>

                <div id="loginMsg" class="alert-message"></div>

                <div class="signup-section">
                    <p>Don't have an account? <a href="signup.html">Create Account</a></p>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    // ========== BACKEND INTEGRATION (FULLY PRESERVED) with SweetAlert Enhancements ==========
    const API_BASE = "http://localhost:8080/api/v1";

    // Helper to show SweetAlert notifications elegantly
    function showSweetAlert(type, title, message, timer = 3000) {
        const config = {
            icon: type,
            title: title,
            text: message,
            toast: false,
            showConfirmButton: true,
            confirmButtonText: 'Continue',
            confirmButtonColor: '#1F4A3A',
            background: '#FEFCF8',
            backdrop: 'rgba(31, 74, 58, 0.4)',
            customClass: {
                popup: 'swal2-popup',
                title: 'swal2-title',
                confirmButton: 'swal2-confirm'
            }
        };
        
        if (type === 'success') {
            config.timer = timer;
            config.showConfirmButton = false;
            setTimeout(() => {
                Swal.close();
            }, timer);
        } else if (type === 'error') {
            config.confirmButtonText = 'Try Again';
        } else if (type === 'info') {
            config.confirmButtonText = 'I Understand';
        } else if (type === 'warning') {
            config.confirmButtonText = 'Okay';
        }
        
        Swal.fire(config);
    }

    function showMsg(sel, text, isSuccess = false) {
        // Fallback for any inline message (but we will use SweetAlert primarily)
        const el = document.querySelector(sel);
        if (el) {
            el.textContent = text;
            el.className = 'alert-message ' + (isSuccess ? 'alert-success' : 'alert-error');
            el.style.display = 'block';
            if (isSuccess) {
                setTimeout(() => {
                    if (el) el.style.display = 'none';
                }, 4000);
            }
        }
    }
    
    function clearMsg(sel) {
        const el = document.querySelector(sel);
        if (el) {
            el.textContent = '';
            el.style.display = 'none';
            el.className = 'alert-message';
        }
    }

    function saveToLocalStorage(key, value, days = 7) {
        const now = new Date();
        const expiryTime = now.getTime() + days * 24 * 60 * 60 * 1000;
        const data = { value, expiry: expiryTime };
        localStorage.setItem(key, JSON.stringify(data));
    }

    function getFromLocalStorage(key) {
        const data = localStorage.getItem(key);
        if (!data) return null;
        try {
            const parsedData = JSON.parse(data);
            if (parsedData?.expiry !== undefined) {
                const now = new Date().getTime();
                if (now > parsedData.expiry) {
                    localStorage.removeItem(key);
                    return null;
                }
                return parsedData.value;
            }
            return data;
        } catch (e) {
            return data;
        }
    }

    function getUsername(email) {
        const token = getFromLocalStorage("token");
        if (!token || !email) return;
        
        $.ajax({
            url: `${API_BASE}/user/getUserByEmail?email=${encodeURIComponent(email)}`,
            type: "GET",
            headers: { "Authorization": `Bearer ${token}` },
            success: function(response) {
                const user = response?.data ?? response;
                if (user?.name) {
                    saveToLocalStorage("name", user.name);
                    saveToLocalStorage("email", user.email);
                    saveToLocalStorage("role", user.role);
                }
            },
            error: function() {
                console.log("Failed to fetch user details");
            }
        });
    }

    function checkUserRoleAndRedirect() {
        const token = getFromLocalStorage("token");
        const role = getFromLocalStorage("role");
        if (!token) return false;
        if (role === "ROLE_ADMIN") {
            window.location.href = "adminDashboard.html";
            return true;
        } else if (role) {
            window.location.href = "index.html";
            return true;
        }
        return false;
    }

    document.addEventListener("DOMContentLoaded", function() {
        // Check if already logged in
        if (getFromLocalStorage("token")) {
            const role = getFromLocalStorage("role");
            if (role === "ROLE_ADMIN") {
                window.location.href = "adminDashboard.html";
            } else if (role) {
                window.location.href = "index.html";
            }
        }

        // Forgot password handler with beautiful SweetAlert
        document.getElementById("forgotPasswordLink")?.addEventListener("click", function(e) {
            e.preventDefault();
            Swal.fire({
                icon: 'info',
                title: '🌿 Sacred Support',
                html: `<p style="font-size: 1rem; color: #2C3A33;">Please contact our wellness concierge at <strong style="color: #D4AF7A;">reservations@helasuwaya.lk</strong> for password assistance.</p>
                       <p style="font-size: 0.85rem; margin-top: 1rem;">Your healing journey matters to us.</p>`,
                confirmButtonText: 'Thank You 🙏',
                confirmButtonColor: '#1F4A3A',
                background: '#FDF7F0',
                customClass: {
                    popup: 'swal2-popup',
                    confirmButton: 'swal2-confirm'
                }
            });
        });

        $("#loginForm").on("submit", function(e) {
            e.preventDefault();
            clearMsg("#loginMsg");
            
            const email = $("#loginEmail").val().trim();
            const password = $("#loginPassword").val();
            const loginBtn = $("#loginBtn");
            
            if (!email || !password) {
                showSweetAlert('error', 'Incomplete Details', 'Please enter both email and password to continue your sacred journey.');
                return;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showSweetAlert('warning', 'Invalid Email', 'Please enter a valid email address (e.g., name@example.com)');
                return;
            }
            
            loginBtn.prop("disabled", true).addClass("loading").html('<i class="fas fa-spinner fa-pulse"></i> Signing In...');
            
            $.ajax({
                url: `${API_BASE}/auth/authentication`,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({ email, password }),
                success: function(response) {
                    console.log("Login response:", response);
                    
                    const payload = response?.data ?? response ?? {};
                    const token = payload?.token || payload?.data?.token || null;
                    let role = payload?.role || payload?.data?.role || null;
                    
                    if (!token) {
                        loginBtn.prop("disabled", false).removeClass("loading").html('<i class="fas fa-arrow-right-to-bracket"></i> Sign In');
                        showSweetAlert('error', 'Authentication Issue', 'Unable to authenticate. Please try again or contact support.');
                        return;
                    }
                    
                    // Save to localStorage
                    saveToLocalStorage("token", token);
                    saveToLocalStorage("email", email);
                    
                    if (role) {
                        role = role.trim().toUpperCase();
                        if (!role.startsWith("ROLE_")) {
                            role = "ROLE_" + role;
                        }
                        saveToLocalStorage("role", role);
                    }
                    
                    // Fetch user name if needed
                    if (!getFromLocalStorage("name")) {
                        getUsername(email);
                    }
                    
                    // SweetAlert Success with elegant Ayurvedic theme
                    const userName = getFromLocalStorage("name") || "Sacred Soul";
                    Swal.fire({
                        icon: 'success',
                        title: '✨ Welcome Back ✨',
                        html: `<span style="font-size: 1.1rem;">Namaste, <strong style="color: #D4AF7A;">${userName}</strong></span><br/>
                               <span style="font-size: 0.9rem;">Your healing journey continues with Hela Suwaya.</span>`,
                        toast: false,
                        showConfirmButton: false,
                        timer: 1800,
                        background: '#FEFCF8',
                        backdrop: 'rgba(31, 74, 58, 0.5)',
                        didOpen: () => {
                            // Add a gentle leaf animation
                            const popup = Swal.getPopup();
                            if (popup) {
                                popup.style.transform = 'scale(0.95)';
                                setTimeout(() => { if(popup) popup.style.transform = 'scale(1)'; }, 100);
                            }
                        }
                    });
                    
                    // Redirect after beautiful alert
                    setTimeout(() => {
                        const storedRole = getFromLocalStorage("role");
                        if (storedRole === "ROLE_ADMIN") {
                            window.location.href = "adminDashboard.html";
                        } else {
                            window.location.href = "index.html";
                        }
                    }, 1800);
                },
                error: function(xhr) {
                    let errorMsg = "Authentication failed. Please verify your credentials.";
                    let errorTitle = "Sign In Unsuccessful";
                    
                    if (xhr.responseJSON?.message) {
                        errorMsg = xhr.responseJSON.message;
                        if (errorMsg.toLowerCase().includes("invalid") || errorMsg.toLowerCase().includes("password")) {
                            errorTitle = "Incorrect Credentials";
                        } else if (errorMsg.toLowerCase().includes("not found")) {
                            errorTitle = "Account Not Found";
                        }
                    } else if (xhr.status === 401) {
                        errorMsg = "Invalid email or password. Please try again with your sacred credentials.";
                        errorTitle = "Authentication Error";
                    } else if (xhr.status === 404) {
                        errorMsg = "Account not found. Please sign up first to join our wellness community.";
                        errorTitle = "New Journey Needed";
                    } else if (xhr.status === 500) {
                        errorMsg = "Server is currently in meditation. Please try again later.";
                        errorTitle = "Temporary Hiccup";
                    }
                    
                    showSweetAlert('error', errorTitle, errorMsg);
                    loginBtn.prop("disabled", false).removeClass("loading").html('<i class="fas fa-arrow-right-to-bracket"></i> Sign In');
                }
            });
        });
        
        // Add floating label effect for elegance
        const inputs = document.querySelectorAll('.input-group-custom input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });
        
        // Additional SweetAlert for demo welcome if needed (optional, to greet visitors)
        // Preload subtle animation on card
        const card = document.querySelector('.auth-card');
        if (card) {
            card.style.animation = 'fadeInUp 0.6s ease-out';
        }
        
        // Gentle pulse on focus for input icons
        const icons = document.querySelectorAll('.input-group-custom i');
        icons.forEach(icon => {
            icon.addEventListener('click', () => {
                const input = icon.parentElement.querySelector('input');
                if (input) input.focus();
            });
        });
        
        // Simulate a graceful environment: display a hidden mantra on console
        console.log("%c🌿 Hela Suwaya - Where Healing Begins 🌿", "color: #D4AF7A; font-size: 14px; font-weight: bold;");
    });
</script>
</body>
</html>
