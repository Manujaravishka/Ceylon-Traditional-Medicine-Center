<!doctype html>
<html lang="si">
<head>
    <meta charset="utf-8" />
    <title>Sign In | Hela Suwaya</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2d5a27; /* Deep Forest Green */
            --primary-light: #4a7c44;
            --secondary: #c5a059; /* Sophisticated Gold */
            --accent: #8b4513;
            --dark: #1a1c1a;
            --light: #ffffff;
            --bg-soft: #fcfcf7;
            --gray: #718096;
            --error: #e53e3e;
            --success: #38a169;
            --radius: 16px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top left, #3d6339, #1a2e18);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--dark);
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
            padding: 50px;
            text-align: center;
        }

        .container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            color: var(--primary);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-subtitle {
            color: var(--gray);
            margin-bottom: 35px;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .input-box {
            position: relative;
            margin-bottom: 18px;
        }

        .input-box input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 1.5px solid #edf2f7;
            border-radius: var(--radius);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            background: #f8faf5;
            color: var(--dark);
        }

        .input-box input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 10px 20px rgba(45, 90, 39, 0.08);
        }

        .input-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-light);
            font-size: 18px;
            opacity: 0.7;
        }

        .forgot-link {
            text-align: right;
            margin: -5px 0 25px;
        }

        .forgot-link a {
            color: var(--gray);
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .forgot-link a:hover {
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius);
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 25px rgba(45, 90, 39, 0.2);
            margin-bottom: 20px;
        }

        .btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(45, 90, 39, 0.3);
        }

        .alert {
            padding: 14px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success { background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; }
        .alert-error { background: #fff5f5; color: #9b2c2c; border: 1px solid #fed7d7; }

        .signup-link {
            margin-top: 20px;
            font-size: 14px;
            color: var(--gray);
        }

        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Welcome Back</h1>
    <p class="form-subtitle">Please enter your details to sign in.</p>
    <form id="loginForm" novalidate>
        <div class="input-box">
            <input id="loginEmail" type="email" placeholder="Email Address" required />
            <i class="fas fa-envelope"></i>
        </div>
        <div class="input-box">
            <input id="loginPassword" type="password" placeholder="Password" required />
            <i class="fas fa-lock"></i>
        </div>
        <div class="forgot-link">
            <a href="#">Forgot your password?</a>
        </div>
        <button id="loginBtn" type="submit" class="btn">Sign In</button>
    </form>
    <div id="loginMsg" class="alert"></div>
    <p class="signup-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    const API_BASE = "http://localhost:8080/api/v1";

    function showMsg(sel, text, ok=false){
        const el = document.querySelector(sel);
        el.textContent = text;
        el.className = 'alert ' + (ok ? 'alert-success' : 'alert-error');
        el.style.display = 'block';
    }
    function clearMsg(sel){
        const el = document.querySelector(sel);
        el.textContent = '';
        el.style.display = 'none';
        el.className = 'alert';
    }
    function logout(){
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        localStorage.removeItem("email");
        localStorage.removeItem("name");
        window.location.href = "signin.html";
    }

    function extractAuth(json){
        const data = json?.data ?? json?.content ?? json?.result ?? json?.payload ?? null;
        const token = data?.token ?? json?.token ?? null;
        const email = data?.email ?? json?.email ?? null;
        const role = data?.role ?? json?.role ?? null;
        return { token, email, role };
    }
    function saveToLocalStorage(key, value, days){
        const now = new Date();
        const expiryTime = now.getTime() + days * 24 * 60 * 60 * 1000;
        const data = { value, expiry: expiryTime };
        localStorage.setItem(key, JSON.stringify(data));
    }
    function getUsername(email) {
        const token = localStorage.getItem("token");
        if (!token || !email) return;
        $.ajax({
            url: `${API_BASE}/user/getUserByEmail?email=${encodeURIComponent(email)}`,
            type: "GET",
            headers: {"Authorization": `Bearer ${token}`},
            success: function (response) {
                const user = response?.data ?? response;
                if (user?.name) {
                    localStorage.setItem("name", user.name);
                    localStorage.setItem("email", user.email);
                    localStorage.setItem("role", user.role);
                }
            },
            error: function () {
                console.log("Failed to fetch username");
            }
        });
    }

    function checkUserRole(){
        const token = localStorage.getItem("token");
        if (!token) return;
        function checkRole(path, onOk, onFail){
            $.ajax({
                url: `${API_BASE}/admin/${path}`,
                type: "GET",
                headers: {"Authorization": `Bearer ${token}`},
                success: onOk,
                error: onFail
            });
        }
        checkRole("admin",
            () => window.location.href = "adminDashboard.html",
            () => checkRole("user", () => window.location.href = "index.html", () => {})
        );
    }

    document.addEventListener("DOMContentLoaded", function () {
        $("#loginForm").on("submit", function(e){
            e.preventDefault();
            clearMsg("#loginMsg");
            const email = $("#loginEmail").val().trim();
            const password = $("#loginPassword").val();

            if (!email || !password){
                showMsg("#loginMsg", "Please enter Email and Password.", false);
                return;
            }

            $("#loginBtn").prop("disabled", true).text("Signing In...");

            $.ajax({
                url: `${API_BASE}/auth/authentication`,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({ email, password }),
                success: function (response) {
                    const payload = response?.data ?? response ?? {};
                    const token = payload?.token || payload?.data?.token || null;
                    let role = payload?.role || payload?.data?.role || null;

                    if (!token) {
                        showMsg("#loginMsg", "Token not received. Please contact support.", false);
                        $("#loginBtn").prop("disabled", false).text("Sign In");
                        return;
                    }

                    localStorage.setItem("token", token);
                    localStorage.setItem("email", email);

                    if (role) {
                        role = role.toUpperCase();
                        if (!role.startsWith("ROLE_")) {
                            role = "ROLE_" + role;
                        }
                        localStorage.setItem("role", role);
                    }

                    if (!role) {
                        getUsername(email);
                    }

                    showMsg("#loginMsg", "✅ Login successful. Redirecting...", true);

                    // Redirect directly to dashboard (user landing page)
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 300);
                },
                error: function (xhr) {
                    const msg = xhr?.responseJSON?.message || "Login failed.";
                    showMsg("#loginMsg", "❌ " + msg, false);
                    $("#loginBtn").prop("disabled", false).text("Sign In");
                }
            });
        });
    });
</script>
</body>
</html>
