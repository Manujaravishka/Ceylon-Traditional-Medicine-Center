<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Review | Hela Suwaya</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --royal-green: #1b3d2f;
            --emerald: #2d6a4f;
            --gold: #d4af37;
            --soft-gold: #f4e4bc;
            --bg-cream: #fdfdf9;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Outfit', sans-serif;
            color: var(--royal-green);
            overflow-x: hidden;
        }

        /* --- Custom Navbar --- */
        .navbar {
            padding: 1.2rem 8%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--royal-green) !important;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--royal-green);
            margin-left: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: 0.3s;
            opacity: 0.8;
        }

        .nav-links a:hover {
            color: var(--gold);
            opacity: 1;
        }

        /* --- Elegant Hero --- */
        .hero {
            height: 45vh;
            background: linear-gradient(rgba(27, 61, 47, 0.8), rgba(27, 61, 47, 0.7)),
            url('https://images.unsplash.com/photo-1540555700478-4be289fbecee?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            clip-path: ellipse(150% 100% at 50% 0%);
        }

        .hero-content h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin-bottom: 10px;
            animation: fadeInUp 0.8s ease;
        }

        /* --- Floating Review Card --- */
        .review-wrapper {
            max-width: 650px;
            margin: -100px auto 80px;
            padding: 0 20px;
        }

        .review-container {
            background: var(--white);
            padding: 50px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(212, 175, 55, 0.1);
            animation: fadeInUp 1s ease;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--emerald);
            margin-bottom: 10px;
            display: block;
        }

        .form-control {
            border: 1.5px solid #eee;
            border-radius: 12px;
            padding: 14px;
            background-color: #fcfcfc;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
            background-color: #fff;
        }

        /* --- Star Rating UI --- */
        .rating-wrapper {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 5px;
        }

        .rating-wrapper input { display: none; }

        .rating-wrapper label {
            font-size: 2rem;
            color: #e0e0e0;
            cursor: pointer;
            transition: 0.2s;
        }

        .rating-wrapper label:hover,
        .rating-wrapper label:hover ~ label,
        .rating-wrapper input:checked ~ label {
            color: var(--gold);
        }

        /* --- Submit Button --- */
        .btn-submit {
            background: linear-gradient(135deg, var(--royal-green), var(--emerald));
            color: white;
            border: none;
            border-radius: 15px;
            padding: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(45, 106, 79, 0.2);
            transition: 0.4s;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(45, 106, 79, 0.3);
            color: white;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2rem; }
            .review-container { padding: 30px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-fluid d-flex justify-content-between">
        <a href="#" class="logo-text">
            <i class="fas fa-spa me-2" style="color: var(--gold);"></i>හෙළ සුවය
        </a>
        <div class="nav-links d-none d-md-flex">
            <a href="#">Home</a>
            <a href="#">Treatments</a>
            <a href="viewReview.html">My Reviews</a>
            <a href="#" onclick="logout()" style="color: #e63946;">Logout</a>
        </div>
    </div>
</nav>

<section class="hero">
    <div class="text-center hero-content">
        <h1>Share Your Journey</h1>
        <p class="opacity-75">Your feedback helps us preserve the art of traditional healing.</p>
    </div>
</section>

<div class="review-wrapper">
    <div class="review-container">
        <form id="addReviewForm">
            <div class="mb-4">
                <label for="userEmail" class="form-label">Patient Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px;"><i class="far fa-user text-muted"></i></span>
                    <input type="email" class="form-control border-start-0" id="userEmail" readonly style="border-radius: 0 12px 12px 0; font-weight: 500;">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Rate Your Experience</label>
                <div class="rating-wrapper">
                    <input type="radio" name="star-rating" id="st5" value="5"><label for="st5" class="fas fa-star"></label>
                    <input type="radio" name="star-rating" id="st4" value="4"><label for="st4" class="fas fa-star"></label>
                    <input type="radio" name="star-rating" id="st3" value="3"><label for="st3" class="fas fa-star"></label>
                    <input type="radio" name="star-rating" id="st2" value="2"><label for="st2" class="fas fa-star"></label>
                    <input type="radio" name="star-rating" id="st1" value="1"><label for="st1" class="fas fa-star"></label>
                </div>
                <input type="number" id="rating" style="display:none;" required min="1" max="5">
            </div>

            <div class="mb-4">
                <label for="comment" class="form-label">Your Message</label>
                <textarea class="form-control" id="comment" rows="5" placeholder="Write about your treatment and results..." required></textarea>
            </div>

            <button type="submit" class="btn btn-submit">
                Submit Review <i class="fas fa-paper-plane ms-2"></i>
            </button>
        </form>
    </div>
</div>

<script>
    // Star Rating Sync Logic
    $(document).on('change', 'input[name="star-rating"]', function() {
        $('#rating').val($(this).val());
    });

    // --- YOUR ORIGINAL JS LOGIC (UNCHANGED) ---
    function getFromLocalStorage(key) {
        const data = localStorage.getItem(key);
        if (!data) return null;
        // Try to parse as JSON if it has expiry, otherwise return as is
        try {
            const parsedData = JSON.parse(data);
            if (parsedData?.expiry !== undefined) {
                const now = new Date().getTime();
                if (now > parsedData.expiry) {
                    localStorage.removeItem(key);
                    return null;
                }
                return parsedData.value;
            }
            return data; // If not expiring format, return original
        } catch (e) {
            // Not JSON, return as plain string
            return data;
        }
    }

    $(document).ready(function () {
        const userEmail = localStorage.getItem("email");
        if (userEmail) {
            $("#userEmail").val(userEmail);
            $("#userEmail").prop('readonly', true);
        } else {
            alert("Please log in first to submit a review.");
            window.location.href = "signin.html";
        }

        $("#addReviewForm").submit(function(event) {
            event.preventDefault();
            const rating = $("input[name='star-rating']:checked").val();
            const comment = $("#comment").val();
            const userEmail = $("#userEmail").val();

            if (!rating) {
                alert("Please select a rating.");
                return;
            }

            if (!comment || comment.trim() === '') {
                alert("Please write a comment.");
                return;
            }

            const reviewData = {
                userEmail: userEmail,
                rating: parseInt(rating),
                comment: comment
            };

            $.ajax({
                url: "http://localhost:8080/api/v1/review/save",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify(reviewData),
                success: function(response) {
                    if (response.code === 201 || response.code === 200) {
                        alert("✅ Review submitted successfully!");
                        $("#addReviewForm")[0].reset();
                        $('input[name="star-rating"]').prop('checked', false);
                        $("#userEmail").val(userEmail);
                    } else {
                        alert("Failed to add review: " + (response.message || 'Unknown error'));
                    }
                },
                error: function(xhr) {
                    const errorMsg = xhr?.responseJSON?.message || "Failed to connect to server.";
                    alert("❌ Error: " + errorMsg);
                    console.error("Review submission error:", xhr);
                }
            });
        });
    });

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>
</html>
