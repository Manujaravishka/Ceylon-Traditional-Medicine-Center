<!doctype html>
<html lang="si">
<head>
    <meta charset="utf-8" />
    <title>Auth | Sign In / Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2d5a27; /* Deep Forest Green */
            --primary-light: #4a7c44;
            --secondary: #c5a059; /* Sophisticated Gold */
            --accent: #8b4513;
            --dark: #1a1c1a;
            --light: #ffffff;
            --bg-soft: #fcfcf7;
            --gray: #718096;
            --error: #e53e3e;
            --success: #38a169;
            --radius: 16px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top left, #3d6339, #1a2e18);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--dark);
        }

        /* Container & Glassmorphism */
        .container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 650px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
        }

        /* Form Areas */
        .form-container {
            width: 50%;
            height: 100%;
            position: relative;
            background: white;
            z-index: 2;
        }

        .form-box {
            position: absolute;
            width: 100%;
            height: 100%;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: var(--transition);
        }

        .form-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            color: var(--primary);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-subtitle {
            color: var(--gray);
            margin-bottom: 35px;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        /* Input Styling */
        .input-box {
            position: relative;
            margin-bottom: 18px;
        }

        .input-box input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 1.5px solid #edf2f7;
            border-radius: var(--radius);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            background: #f8faf5;
            color: var(--dark);
        }

        .input-box input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 10px 20px rgba(45, 90, 39, 0.08);
        }

        .input-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-light);
            font-size: 18px;
            opacity: 0.7;
        }

        /* Phone Input Adjustment */
        .iti { width: 100%; }
        .iti__flag-container { border-radius: var(--radius) 0 0 var(--radius); }

        .forgot-link {
            text-align: right;
            margin: -5px 0 25px;
        }

        .forgot-link a {
            color: var(--gray);
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .forgot-link a:hover {
            color: var(--primary);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius);
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 25px rgba(45, 90, 39, 0.2);
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(45, 90, 39, 0.3);
        }

        /* Toggle Panel Styling */
        .toggle-container {
            width: 50%;
            position: relative;
            overflow: hidden;
            z-index: 5;
        }

        .toggle-panel {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary) 0%, #1a2e18 100%);
            color: white;
            transition: var(--transition);
        }

        .toggle-panel h2 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin-bottom: 15px;
        }

        .toggle-panel p {
            font-size: 16px;
            margin-bottom: 35px;
            line-height: 1.6;
            opacity: 0.85;
        }

        .toggle-btn {
            padding: 14px 45px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            background: transparent;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .toggle-btn:hover {
            background: white;
            color: var(--primary);
            border-color: white;
        }

        /* Switch Logic (Classes used by JS) */
        .toggle-left { transform: translateX(-100%); }
        .toggle-right { right: 0; transform: translateX(0); }
        .container.active .toggle-left { transform: translateX(0); }
        .container.active .toggle-right { transform: translateX(100%); }

        .login-form { opacity: 1; transform: translateX(0); z-index: 10; }
        .register-form { opacity: 0; transform: translateX(100%); z-index: 5; }
        .container.active .login-form { opacity: 0; transform: translateX(-100%); }
        .container.active .register-form { opacity: 1; transform: translateX(0); z-index: 10; }

        /* Error/Alert Styles */
        .alert {
            padding: 14px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success { background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; }
        .alert-error { background: #fff5f5; color: #9b2c2c; border: 1px solid #fed7d7; }

        .phone-error {
            color: var(--error);
            font-size: 12px;
            margin: 5px 0 0 5px;
            display: none;
        }

        .feature-icon {
            font-size: 60px;
            margin-bottom: 25px;
            color: var(--secondary);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }

        /* Responsiveness */
        @media (max-width: 850px) {
            .container { height: auto; flex-direction: column; max-width: 450px; }
            .form-container, .toggle-container { width: 100%; }
            .toggle-container { height: 300px; order: -1; }
            .form-box { position: relative; padding: 40px 30px; }
            .container.active .login-form { display: none; }
            .register-form { position: relative; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-container">
        <div class="form-box login-form">
            <h1>Welcome.</h1>
            <p class="form-subtitle">Please enter your details to sign in.</p>
            <form id="loginForm" novalidate>
                <div class="input-box">
                    <input id="loginEmail" type="email" placeholder="Email Address" required />
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input id="loginPassword" type="password" placeholder="Password" required />
                    <i class="fas fa-lock"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot your password?</a>
                </div>
                <button id="loginBtn" type="submit" class="btn">Sign In</button>
            </form>
            <div id="loginMsg" class="alert"></div>
        </div>

        <div class="form-box register-form">
            <h1>Join Us.</h1>
            <p class="form-subtitle">Experience the wisdom of Ayurveda.</p>
            <form id="signupForm" novalidate>
                <div class="input-box">
                    <input id="name" type="text" placeholder="Full Name" required />
                    <i class="fas fa-user"></i>
                </div>
                <div class="input-box">
                    <input id="signupEmail" type="email" placeholder="Email Address" required />
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input id="contact" type="tel" placeholder="Contact Number" />
                    <i class="fas fa-phone"></i>
                    <div class="phone-error" id="phone-error">Invalid phone number</div>
                </div>
                <div class="input-box">
                    <input id="signupPassword" type="password" placeholder="Create Password" required />
                    <i class="fas fa-lock"></i>
                </div>
                <div class="input-box">
                    <input id="signupConfirm" type="password" placeholder="Confirm Password" required />
                    <i class="fas fa-check-circle"></i>
                </div>
                <button id="signupBtn" type="submit" class="btn">Create Account</button>
            </form>
            <div id="signupMsg" class="alert"></div>
        </div>
    </div>

    <div class="toggle-container">
        <div class="toggle-panel toggle-right">
            <i class="fas fa-leaf feature-icon"></i>
            <h2>New Here?</h2>
            <p>Sign up and discover a personalized approach to your well-being.</p>
            <button class="toggle-btn register-btn">Create Account</button>
        </div>
        <div class="toggle-panel toggle-left">
            <i class="fas fa-seedling feature-icon"></i>
            <h2>Welcome Back!</h2>
            <p>Keep your journey on track. Sign in to your herbal dashboard.</p>
            <button class="toggle-btn login-btn">Sign In</button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>

<script>
    // --- ALL YOUR ORIGINAL JAVASCRIPT LOGIC REMAINS UNTOUCHED ---
    const container = document.querySelector('.container');
    const registerBtn = document.querySelectorAll('.register-btn');
    const loginBtn = document.querySelectorAll('.login-btn');

    registerBtn.forEach(b => b.addEventListener('click', () => container.classList.add('active')));
    loginBtn.forEach(b => b.addEventListener('click', () => container.classList.remove('active')));

    const API_BASE = "http://localhost:8080/api/v1";

    function showMsg(sel, text, ok=false){
        const el = document.querySelector(sel);
        el.textContent = text;
        el.className = 'alert ' + (ok ? 'alert-success' : 'alert-error');
        el.style.display = 'block';
    }
    function clearMsg(sel){
        const el = document.querySelector(sel);
        el.textContent = '';
        el.style.display = 'none';
        el.className = 'alert';
    }
    function extractAuth(json){
        const data = json?.data ?? json?.content ?? json?.result ?? json?.payload ?? null;
        const token = data?.token ?? json?.token ?? null;
        const email = data?.email ?? json?.email ?? null;
        return { token, email };
    }
    function saveToLocalStorage(key, value, days){
        const now = new Date();
        const expiryTime = now.getTime() + days * 24 * 60 * 60 * 1000;
        const data = { value, expiry: expiryTime };
        localStorage.setItem(key, JSON.stringify(data));
    }
    function showDashboard(msg){
        alert(msg);
    }

    document.addEventListener("DOMContentLoaded", function () {
        const phoneInputField = document.querySelector("#contact");
        const phoneError = document.querySelector("#phone-error");
        const signupBtn = document.querySelector("#signupBtn");

        const iti = window.intlTelInput(phoneInputField, {
            initialCountry: "lk",
            preferredCountries: ["lk", "us", "gb", "in", "au"],
            separateDialCode: true,
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
        });

        function validatePhoneNumber(){
            const phoneNumber = phoneInputField.value.trim();
            const phoneRegex = /^07\d{8}$/;
            if (phoneNumber !== "" && (!iti.isValidNumber() || !phoneRegex.test(phoneNumber))) {
                phoneError.style.display = "block";
                phoneError.textContent = "Invalid phone number format!";
                phoneInputField.classList.add("invalid");
                signupBtn.disabled = true;
            } else {
                phoneError.style.display = "none";
                phoneInputField.classList.remove("invalid");
                signupBtn.disabled = false;
            }
        }
        phoneInputField.addEventListener("input", validatePhoneNumber);

        $("#signupForm").on("submit", function(e){
            e.preventDefault();
            clearMsg("#signupMsg");
            const name = $("#name").val().trim();
            const email = $("#signupEmail").val().trim();
            const contactRaw = $("#contact").val().trim();
            const contact = iti.getNumber();
            const password = $("#signupPassword").val();
            const confirm = $("#signupConfirm").val();

            if (!name || !email || !password){
                showMsg("#signupMsg", "Name, Email, Password aniwaren danna.", false);
                return;
            }
            if (password !== confirm){
                showMsg("#signupMsg", "Passwords match wenne ne. Please check.", false);
                return;
            }

            $("#signupBtn").prop("disabled", true).text("Registering...");

            $.ajax({
                url: `${API_BASE}/user/register`,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({ name, email, contact, password }),
                success: function (response) {
                    const { token } = extractAuth(response);
                    if (token) localStorage.setItem("token", token);
                    showMsg("#signupMsg", "✅ Signup Successful!", true);
                    setTimeout(() => {
                        container.classList.remove('active');
                        $("#signupBtn").prop("disabled", false).text("Register");
                        clearMsg("#signupMsg");
                    }, 900);
                },
                error: function (xhr) {
                    const msg = xhr?.responseJSON?.message || "Unknown error";
                    showMsg("#signupMsg", "❌ Signup Failed: " + msg, false);
                },
                complete: function () {
                    $("#signupBtn").prop("disabled", false).text("Register");
                }
            });
        });

        $("#loginForm").on("submit", function(e){
            e.preventDefault();
            clearMsg("#loginMsg");
            const email = $("#loginEmail").val().trim();
            const password = $("#loginPassword").val();

            if (!email || !password){
                showMsg("#loginMsg", "Email saha Password danna.", false);
                return;
            }

            $.ajax({
                url: `${API_BASE}/auth/authentication`,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({ email, password }),
                success: function (response) {
                    const { token } = extractAuth(response);
                    if (!token){
                        showMsg("#loginMsg", "Token labunane. Backend response eka balanna.", false);
                        return;
                    }
                    localStorage.setItem("token", token);
                    getUsername(email);
                    checkUserRole();
                    showMsg("#loginMsg", "✅ Login success!", true);
                },
                error: function (xhr) {
                    const msg = xhr?.responseJSON?.message || "Login failed.";
                    showMsg("#loginMsg", "❌ " + msg, false);
                }
            });
        });
    });

    function checkUserRole(){
        const token = localStorage.getItem("token");
        if (!token) return;
        function checkRole(path, onOk, onFail){
            $.ajax({
                url: `${API_BASE}/admin/${path}`,
                type: "GET",
                headers: {"Authorization": `Bearer ${token}`},
                success: onOk,
                error: onFail
            });
        }
        checkRole("admin",
            () => window.location.href = "adminDashboard.html",
            () => checkRole("user", () => window.location.href = "index.html", () => {})
        );
    }

    function getUsername(emailFromLoginInput){
        const email = (emailFromLoginInput || $('#loginEmail').val() || '').trim();
        const token = localStorage.getItem("token");
        if (!email) return;
        $.ajax({
            url: `${API_BASE}/user/getUserByEmail?email=${encodeURIComponent(email)}`,
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` },
            success: function (response) {
                const data = response?.data;
                if (data){
                    saveToLocalStorage("name", data.name, 5);
                    saveToLocalStorage("role", data.role, 5);
                }
            }
        });
    }
</script>
</body>
</html>
